<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Details | StepStyle</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container">
      <a class="navbar-brand" href="index.html">👟 StepStyle</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link active" href="products.html">Products</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="back-wrapper container">
    <a href="products.html" class="back-btn">← Back to Products</a>
  </div>

  <div class="product-page">
    <div class="gallery">
      <img id="mainImage" alt="Product Image" style="border-radius: 14px; width: 100%;">
      <div id="thumbnails"></div>
    </div>

    <div class="details">
      <h1 id="productName"></h1>
      <p id="productBrand" style="color: #999; font-size: 14px; text-transform: uppercase; letter-spacing: 1px;"></p>
      <p class="price" id="productPrice"></p>
      <p id="productDescription"></p>
      <ul class="highlights">
        <li>✔ Breathable mesh material</li>
        <li>✔ Cushioned sole for comfort</li>
        <li>✔ Durable outsole</li>
        <li>✔ Ideal for daily wear</li>
      </ul>
      <p id="productSizes" style="font-weight: 500; margin-bottom: 20px;"></p>
      <a id="amazonBtn" target="_blank" class="btn">Buy on Amazon →</a>
    </div>
  </div>

  <section class="related container">
    <h2 class="fw-bold mb-2">You May Also Like</h2>
    <div class="product-grid" id="relatedProducts"></div>
  </section>

  <footer class="footer">
    <p>© 2026 StepStyle. All rights reserved.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <script src="data/products.js"></script>
  <script src="assets/js/script.js"></script>
</body>

</html>
